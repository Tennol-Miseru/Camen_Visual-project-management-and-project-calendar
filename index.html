<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>工程日历</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <div class="eyebrow">工程可视化</div>
      <h1>工程日历</h1>
    </div>
    <div class="header-actions">
      <label class="pill desktop-only">
        同屏
        <input type="checkbox" id="dual-toggle" title="同时显示日历与工程" checked>
      </label>
      <label class="pill desktop-only" id="ratio-pill">
        日历宽度
        <input type="range" id="ratio-range" min="55" max="85" value="70" title="调整日历区域比例">
      </label>
      <label class="pill desktop-only">
        主题
        <select id="theme-select">
          <option value="black">黑色</option>
          <option value="white">白色</option>
          <option value="gray">灰暗</option>
        </select>
      </label>
      <div class="pill desktop-only">本地数据 · 自动保存</div>
      <button type="button" class="theme-toggle-btn mobile-only" id="theme-cycle-btn" title="切换主题">🎨</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-target="calendar-view">日期视图</button>
    <button class="tab" data-target="projects-view">工程视图</button>
  </nav>

  <main>
    <section id="calendar-view" class="view active">
      <div class="toolbar">
        <div class="month-nav">
          <button id="prev-month" aria-label="上一月">←</button>
          <div id="month-label" class="month-label"></div>
          <button id="next-month" aria-label="下一月">→</button>
        </div>
        <div class="toolbar-right">
          <div id="legend" class="legend"></div>
          <select id="project-filter" class="select-ghost">
            <option value="">全部工程</option>
          </select>
          <button type="button" class="btn-ghost" id="filter-clear" hidden>清除筛选</button>
        </div>
      </div>

      <div id="calendar-grid" class="calendar-grid"></div>

      <div class="timeline-wrapper">
        <div class="timeline-header" id="timeline-header"></div>
        <div class="timeline-controls">
          <label class="pill">
            轴缩放
            <input type="range" id="timeline-zoom" min="0.2" max="4.5" step="0.1" value="1" title="调整时间轴缩放">
          </label>
        </div>
        <div id="timeline-grid" class="timeline-grid"></div>
      </div>

      <details class="panel">
        <summary>添加 / 编辑日期条</summary>
        <div class="form-switch">
          <span class="muted">模式切换</span>
          <button type="button" class="btn-ghost" id="task-new-btn">切换到新建</button>
        </div>
        <form id="task-form" class="form-grid">
          <input type="hidden" name="taskId" id="task-id">
          <label>标题
            <input required name="title" placeholder="如：方案评审">
          </label>
          <label>颜色
            <input required name="color" type="color" value="#00bfa6">
            <label class="inline">
              <input type="checkbox" id="use-project-color"> 使用工程色
            </label>
          </label>
          <label>开始日期
            <input required name="start" type="date" id="start-date">
          </label>
          <label>结束日期
            <input required name="end" type="date" id="end-date">
            <label class="inline">
              <input type="checkbox" id="no-end"> 不限时（自动延申至下月末）
            </label>
          </label>
          <label>所属工程
            <select name="projectId" id="project-select"></select>
          </label>
          <label>工程步骤
            <select name="stepId" id="step-select">
              <option value="">（先选工程）</option>
            </select>
          </label>
          <label>备注
            <input name="note" placeholder="可选">
          </label>
          <label class="inline">
            <input type="checkbox" id="task-done" name="done"> 标记完成（无工程/步骤也可勾选）
          </label>
          <div class="form-actions">
            <button type="submit">保存日期条</button>
            <button type="button" class="btn-ghost" id="delete-task">删除当前</button>
          </div>
        </form>
      </details>
    </section>

    <section id="projects-view" class="view">
      <div class="panel">
        <div class="card-head">
          <h2>工程列表</h2>
          <button type="button" class="btn-ghost" id="stats-overview-btn">总览统计</button>
        </div>
        <div id="projects-list" class="project-list"></div>
      </div>

      <details class="panel">
        <summary>新增工程</summary>
        <div class="form-switch">
          <span class="muted">模式切换</span>
          <button type="button" class="btn-ghost" id="project-new-btn">切换到新建</button>
        </div>
        <form id="project-form" class="form-grid">
          <input type="hidden" name="projectId" id="project-id">
          <label>工程名称
            <input required name="name" placeholder="如：移动端重构">
          </label>
          <label>简介
            <input name="description" placeholder="一句话说明">
          </label>
          <label>工程颜色
            <input type="color" name="projectColor" id="project-color" value="#00bfa6">
          </label>
          <label>步骤
            <div class="step-list" id="step-list"></div>
            <button type="button" class="btn-ghost" id="add-step">＋ 添加步骤</button>
          </label>
          <label class="inline">
            <input type="checkbox" id="project-draft" name="draft"> 保存为草稿（不在主列表显示）
          </label>
          <button type="submit">创建工程</button>
        </form>
      </details>

      <div class="panel" id="draft-box">
        <h3>草稿箱</h3>
        <div id="draft-list" class="project-list"></div>
      </div>
    </section>
  </main>

  <div id="stats-overlay" class="overlay" hidden>
    <div class="overlay-inner">
      <div class="stats-toolbar">
        <button type="button" class="btn-ghost" id="stats-back" hidden>← 返回总览</button>
        <h2 id="stats-title">工程统计总览</h2>
        <button type="button" class="btn-ghost" id="stats-close" style="margin-left:auto">✕ 关闭</button>
      </div>
      <div id="stats-content"></div>
    </div>
  </div>

  <template id="task-chip-template">
    <div class="task-chip"><span class="dot"></span><span class="text"></span></div>
  </template>

  <div class="panel footer">
    <div class="footer-left">
      <strong>防帕金森模式</strong>
      <span class="muted">勾选后日期条自动减半时长，可随时恢复</span>
    </div>
    <div class="footer-actions">
      <label class="pill">
        防帕金森
        <input type="checkbox" id="fpd-toggle" title="将所有日期条持续时间减半">
      </label>
    </div>
  </div>

  <footer class="panel footer">
    <div class="footer-left">
      <strong>数据导入 / 导出</strong>
      <span class="muted">文件格式：JSON，含工程、步骤、日期条、主题、防帕金森设置</span>
    </div>
    <div class="footer-actions">
      <label class="pill">
        并入现有数据
        <input type="checkbox" id="import-merge">
      </label>
      <input type="file" id="import-file" accept="application/json" hidden>
      <button type="button" class="btn-ghost" id="import-btn">导入文件</button>
      <button type="button" id="export-btn">导出为 JSON</button>
    </div>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="modules/core.js"></script>
  <script src="modules/tasks.js"></script>
  <script src="modules/actions.js"></script>
  <script src="modules/render.js"></script>
  <script src="modules/touch.js"></script>
  <script src="modules/bindings.js"></script>
  <script src="app.js"></script>
</body>
</html>
